<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIFT SELECT</title>

<style>
body {
  font-family: "Helvetica Neue", "Noto Sans JP", sans-serif;
  margin: 0;
  background: #f7f7f7;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

h1 {
  font-size: 16px;
  letter-spacing: 2px;
}

.item {
  background: #fff;
  margin-bottom: 15px;
  padding: 15px;
  display: flex;
  gap: 10px;
  border-radius: 10px;
}

/* 画像 */
.item img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 5px;
}

.item-info {
  flex: 1;
}

.item-name {
  font-size: 14px;
  margin-top: 5px;
  margin-bottom: 5px;
}

/* ラジオ */
.item-label input[type="radio"] {
  transform: scale(1.2);
  flex-shrink: 0;
}

button.detail {
  font-size: 12px;
  color: #555;
  background: none;
  border: none;
  text-decoration: underline;
  cursor: pointer;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  box-sizing: border-box;
}

.form-group {
  margin-top: 10px;
}

.form-group label {
  display: block;
  font-size: 12px;
  margin-bottom: 5px;
  letter-spacing: 1px;
  color: #888;
}
  
.submit-btn {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* モーダル */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
　z-index: 1000;
}

.modal-content {
  background: #fff;
  margin: 50px auto;
  padding: 20px;
  width: 90%;
  border-radius: 10px;
  position: relative;
  max-height: 80vh;      /* ← 高さ制限 */
  overflow-y: auto;      /* ← スクロール可能 */
}

/* ✕ボタン */
.close-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 25px;
  border: none;
  background: #fff;
  color: #000;
  cursor: pointer;
}

/* 背景スクロール止める */
body.modal-open {
  overflow: hidden;
}

.modal img {
  width: 100%;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>GIFT SELECT</h1>

<form id="giftForm">

<!-- 商品① -->
<div class="item">
  <img src="A-2.jpg">
    <div class="text-block">
      <div class="item-info">
  <input type="radio" name="gift" value="選択肢 1" required>
    <div class="item-name">Ａコース</div>
    <button type="button" class="detail" onclick="openModal('modal1')">詳細を見る</button>
    </div>
</div>
</div>
<!-- 商品② -->
<div class="item">
  <img src="B-1.jpg">
    <div class="text-block">
      <div class="item-info">
  <input type="radio" name="gift" value="選択肢 2" required>
    <div class="item-name">Ｂコース</div>
    <button type="button" class="detail" onclick="openModal('modal2')">詳細を見る</button>
  </div>
</div>
</div>

<!-- 商品③ -->
<div class="item">
  <img src="https://via.placeholder.com/80">
    <div class="text-block">
      <div class="item-info">
  <input type="radio" name="gift" value="選択肢 3" required>
    <div class="item-name">Ｃコース</div>
    <button type="button" class="detail" onclick="openModal('modal3')">詳細を見る</button>
  </div>
</div>
</div>

<!-- 入力 -->
<div class="form-group">
  <label>姓</label>
  <input type="text" name="family-name" autocomplete="family-name" placeholder="姓" required>
</div>
<div class="form-group">
  <label>名</label>
 <input type="text" name="given-name" autocomplete="given-name" placeholder="名" required>
</div>
<div class="form-group">
  <label>郵便番号</label>
  <input type="text" name="postal-code" autocomplete="postal-code" placeholder="郵便番号" required>
</div>
<div class="form-group">
  <label>都道府県</label>
<input type="text" name="address-level1" autocomplete="address-level1" placeholder="都道府県" required>
</div>
<div class="form-group">
  <label>市区町村</label>
<input type="text" name="address-level2" autocomplete="address-level2" placeholder="市区町村" required>
</div>
<div class="form-group">
  <label>番地等</label>
  <input type="text" name="address-line1" autocomplete="address-line1" placeholder="番地等" required>
</div>
<div class="form-group">
  <label>建物名・部屋番号</label>
  <input type="text" name="address-line2" autocomplete="address-line2" placeholder="建物名・部屋番号等" required>
</div>
<div class="form-group">
  <label>メールアドレス</label>
  <input type="email" name="email" autocomplete="email" placeholder="メールアドレス" required>
</div>
<div class="form-group">
  <label>電話番号</label>
  <input type="tel" name="tel" autocomplete="tel" placeholder="電話番号" required>
</div>
<div class="form-group">
  <label>備考</label>
 <textarea name="note" placeholder="備考"></textarea>
</div>

<button class="submit-btn">送信する</button>

</form>

</div>

<!-- モーダル① -->
<div id="modal1" class="modal" onclick="closeModal(this)">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('modal1')">×</button>
    <img src="A-1.jpg">
    <img src="A-2.jpg">
    <p>Ａコースの詳細説明です。</p>
  </div>
</div>

<!-- モーダル② -->
<div id="modal2" class="modal" onclick="closeModal(this)">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('modal2')">×</button>
    <img src="B-2.png">
    <img src="B-3.png">
    <p>Ｂコースの詳細説明です。</p>
  </div>
</div>

<!-- モーダル③ -->
<div id="modal3" class="modal" onclick="closeModal(this)">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('modal3')">×</button>
    <img src="https://via.placeholder.com/300">
    <p>Ｃコースの詳細説明です。</p>
  </div>
</div>


<script>
function openModal(id) {
  document.getElementById(id).style.display = "block";
}

function closeModal(el) {
  el.style.display = "none";
}

/* Googleフォーム送信 */
document.getElementById("giftForm").addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(this);



  fetch("https://docs.google.com/forms/d/e/1FAIpQLScUNwFEXDLLVJjdCHG-eDyxwKixYxSiiMey7Q6jikzakyQVuA/formResponse", {
    method: "POST",
    mode: "no-cors",
    body: new URLSearchParams({
      "entry.1810305746": formData.get("gift"),
      "entry.1418185268": formData.get("family-name"),
      "entry.1480159621": formData.get("given-name"),
      "entry.531374198": formData.get("email"),
      "entry.1089758164": formData.get("postal-code"),
      "entry.1060944732": formData.get("address-level1"),
      "entry.370262192": formData.get("address-level2"),
      "entry.1638755331": formData.get("address-line1"),
      "entry.1376248401": formData.get("address-line2"),
      "entry.1743876766": formData.get("tel"),
      "entry.845199153": formData.get("note")
    })
  });

  alert("送信完了しました！");
});
</script>

</body>
</html>
